name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v2
        with:
          xcode-version: '16.4'

      - name: Resolve Swift packages
        run: |
          xcodebuild -project WhisperServer/WhisperServer.xcodeproj -resolvePackageDependencies

      - name: Build iOS app bundle
        run: |
          xcodebuild \
            -project WhisperServer/WhisperServer.xcodeproj \
            -scheme WhisperServer \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SKIP_INSTALL=NO \
            BUILD_DIR=build

      - name: Package unsigned .ipa
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/Release-iphoneos/WhisperServer.app Payload/
          cd Payload
          zip -r ../WhisperServer.ipa WhisperServer.app

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperServer.ipa
          path: WhisperServer.ipa
